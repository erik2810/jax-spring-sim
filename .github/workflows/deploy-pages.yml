name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install (with server extra)
        run: uv sync --extra server

      - name: Bake scenes with JAX
        run: uv run python scripts/bake_scenes.py frontend/public/scenes

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build static site
        working-directory: frontend
        env:
          VITE_STATIC: 'true'
          BASE_PATH: '/jax-spring-sim/'
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
